  2.1.2:
    changes:
      minor_changes:
        - remi - initial commit.
      release_summary: >-
        Addition of the Remi's RPM repository role.
    release_date: '2025-11-21'
  2.1.1:
    changes:
      breaking_changes:
        - systemd_resolved - iterable values are now handled differently.
      release_summary: >-
        Updates the systemd_resolved configuration template to correctly
