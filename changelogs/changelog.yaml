      release_summary:
        Fixes the cloudflared_tunnel service loop issue.
    release_date: '2026-05-26'
  2.2.4:
    changes:
      bugfixes:
        - needs_restarting - fix stderr crontab output redirection.
      minor_changes:
        - ansible-lint - ignore molecule tests.
        - pre-commit - multiple updates.
      release_summary:
        Fixes needs_restarting crontab stderr redirection.
    release_date: '2026-04-15'
  2.2.3:
    changes:
      minor_changes:
        - pre-commit - update configs and fix linting issues.
      release_summary:
        Updates pre-commit configs and fixes linting issues.
    release_date: '2026-02-28'
  2.2.2:
    changes:
      minor_changes:
        - galaxy - loosen ansible.posix dependency versioning.
      release_summary:
        Loosens ansible.posix dependency versioning.
    release_date: '2026-02-27'
  2.2.1:
    changes:
      minor_changes:
        - cloudflare_warp - use systemd override instead of lineinfile.
        - cloudflare_warp - add support for changing log level.
      release_summary:
        Updates the cloudflare_warp role to support modification of log level
        at the systemd service level.
    release_date: '2026-02-24'
  2.2.0:
    changes:
      minor_changes:
        - cloudflare_warp - add option to toggle no color environment variable.
      release_summary:
        This release provides a toggle for a cloudflare warp systemd addition
        by defining NO_COLOR=1 in the service files.
    release_date: '2026-02-24'
  2.1.9:
    changes:
      breaking_changes:
        - cloudflared - use managed tunnels and only overlay a single token.
      release_summary:
        This release changes cloudflared role behavior migrating from locally
        configured tunnels to cloudflare managed tunnels, therefore only
        overlaying a tunnel token.
    release_date: '2026-02-23'
  2.1.8:
    changes:
      minor_changes:
        - cloudflare_warp - add support for overlaying custom scripts.
      release_summary:
        This release adds support for overlaying custom scripts alongside
        cloudflare warp.
    release_date: '2026-01-15'
  2.1.7:
    changes:
      minor_changes:
        - openssh_server - add support for defining include files in
          sshd_config.
      release_summary:
        This release adds support for defining include files in the openssh
        server configuration file.
    release_date: '2026-01-15'
  2.1.6:
    changes:
      minor_changes:
        - rclone - only populate rclone_config_pass if mounts are defined.
      release_summary:
        This release includes a minor change to rclone role config pass
        population.
    release_date: '2025-11-28'
  2.1.5:
    changes:
      minor_changes:
