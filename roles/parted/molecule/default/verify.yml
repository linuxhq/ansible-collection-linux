---
- name: Verify
  hosts: all
  tasks:
    - name: Ensure devices are verified
      tags:
        - parted
      ansible.builtin.assert:
        that:
          - ansible_facts.devices.sdb is defined
          - ansible_facts.devices.sdb.size == '5.00 GB'
          - ansible_facts.devices.sdb.partitions.sdb1 is defined
          - ansible_facts.devices.sdb.partitions.sdb1.size == '5.00 GB'
...
