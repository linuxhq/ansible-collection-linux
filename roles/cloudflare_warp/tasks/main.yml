---
- name: Ensure cloudflare warp repository file is present
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.yum_repository:
    baseurl: https://pkg.cloudflareclient.com/rpm
    description: cloudflare-warp-stable
    enabled: true
    gpgcheck: true
    gpgkey: https://pkg.cloudflareclient.com/pubkey.gpg
    file: cloudflare-warp
    name: cloudflare-warp-stable

- name: Ensure cloudflare warp repository key is present
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.rpm_key:
    key: https://pkg.cloudflareclient.com/pubkey.gpg
    state: present
    validate_certs: true

- name: Ensure cloudflare warp packages are present
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.dnf:
    name: cloudflare-warp
    state: present

- name: Ensure cloudflare warp systemd override directory is managed
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.file:
    group: root
    mode: '0755'
    owner: root
    path: /etc/systemd/system/warp-svc.service.d
    state: directory

- name: Ensure cloudflare warp systemd override is managed
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.template:
    dest: /etc/systemd/system/warp-svc.service.d/override.conf
    group: root
    mode: '0644'
    owner: root
    src: override.conf.j2
  notify: Restart warp-svc

- name: Ensure cloudflare warp systemd service is reloaded
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Ensure cloudflare warp is started and enabled on boot
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.systemd_service:
    enabled: true
    name: warp-svc.service
    state: started

- name: Ensure cloudflare warp status is gathered
  tags:
    - cloudflare_warp
  ansible.builtin.command:
    cmd: >
      /usr/bin/warp-cli --accept-tos status
  register: __cloudflare_warp_status
  changed_when: false

- name: Ensure cloudflare warp status fact is generated
  tags:
    - cloudflare_warp
  ansible.builtin.set_fact:
    __cloudflare_warp_connected:
      "{{ 'Connected' in __cloudflare_warp_status.stdout }}"

- name: Ensure cloudflare warp connector token is set
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.command:
    cmd: >
      /usr/bin/warp-cli --accept-tos connector new {{ cloudflare_warp_token }}
  changed_when: true
  when:
    - cloudflare_warp_token is not none
    - not __cloudflare_warp_connected | bool

- name: Ensure cloudflare warp connector is connected
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.command:
    cmd: >
      /usr/bin/warp-cli --accept-tos connect
  changed_when: true
  when:
    - cloudflare_warp_token is not none
    - not __cloudflare_warp_connected | bool

- name: Ensure cloudflare warp scripts are managed
  tags:
    - cloudflare_warp
  become: true
  ansible.builtin.template:
    dest: "{{ _script.path }}/{{ _script.name }}"
    group: root
    mode: '0700'
    owner: root
    src: script.j2
  loop: "{{ cloudflare_warp_scripts }}"
  loop_control:
    label: "{{ _script.name | d(none) }}"
    loop_var: _script
  when:
    - _script.base64 is defined
    - _script.name is defined
    - _script.path is defined
...
